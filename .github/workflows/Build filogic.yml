name: Build filogic

on:
  # schedule:
  #   - cron: '0 2 */5 * *'
  workflow_dispatch:

env:
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: ./sh/scripts-part1.sh
  DIY_P2_SH: ./sh/scripts-part2.sh
  DEFAULT_SETTING: ./default-settings-m0eak
  CACHE_TOOLCHAIN: true
  TZ: Asia/Shanghai

jobs:
  build:
    name: 编译 ${{ matrix.device }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: GL-MT3600BE
            repo_url: 'https://github.com/immortalwrt/immortalwrt.git'
            repo_branch: 'master'
            config_file: './config/mt3600be.config'
            workflow_name: 'GL-MT3600BE'
          - device: GL-MT5000
            repo_url: 'https://github.com/m0eak/fanchmwrt.git'
            repo_branch: 'mt5000'
            config_file: './config/mt5000.config'
            workflow_name: 'GL-MT5000'
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@main

    - name: 查看运行环境配置
      run: |
        echo "================================================="
        echo "           GitHub Actions 运行环境详情"
        echo "================================================="
        echo "CPU 信息:"
        lscpu
        echo "CPU 线程数: $(nproc)"
        echo "-------------------------------------------------"
        echo "内存信息:"
        free -h
        echo "Swap 分区大小: $(grep SwapTotal /proc/meminfo | awk '{print $2/1024/1024 " GB"}')"
        echo "-------------------------------------------------"
        echo "磁盘空间信息:"
        df -hT
        echo "-------------------------------------------------"
        echo "操作系统信息:"
        uname -a
        lsb_release -a
        echo "================================================="

    - name: 磁盘清理
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"

    - name: 磁盘清理2
      run: |
        echo "清理前磁盘空间："
        df -hT
        echo "开始清理，释放更多空间..."
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /usr/share/swift /usr/local/.ghcup
        sudo docker image prune --all --force
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        echo "清理后磁盘空间："
        df -hT

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/*
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq purge azure-cli* ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "WORKFLOW_NAME=${{ matrix.workflow_name }}" >> $GITHUB_ENV

    - name: 安装本地 Automake 1.17
      run: |
        set -e
        PREFIX=/workdir/automake-1.17
        BUILD_DIR=/workdir/automake-1.17-build
        mkdir -p "$BUILD_DIR"
        cd "$BUILD_DIR"
        curl -fL https://ftp.gnu.org/gnu/automake/automake-1.17.tar.xz -o automake-1.17.tar.xz
        rm -rf automake-1.17-src
        mkdir -p automake-1.17-src
        tar -xf automake-1.17.tar.xz -C automake-1.17-src --strip-components=1
        cd automake-1.17-src
        ./configure --prefix="$PREFIX"
        make -j$(nproc)
        make install
        echo "$PREFIX/bin" >> $GITHUB_PATH
        "$PREFIX/bin/automake-1.17" --version | sed -n '1p'
        "$PREFIX/bin/aclocal-1.17" --version | sed -n '1p'

    - name: 克隆固件源代码
      working-directory: /workdir
      run: |
        git clone -b ${{ matrix.repo_branch }} ${{ matrix.repo_url }} --single-branch --depth 1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: 加载 Feeds 和自定义脚本 (Part 1)
      run: |
        cd openwrt
        [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF ./feeds.conf.default
        ./scripts/feeds update -a
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 安装 Feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 应用 Sonic Fullcone 补丁
      if: matrix.workflow_name == 'GL-MT5000'
      run: |
        cd openwrt
        curl -sSL https://raw.githubusercontent.com/mufeng05/openwrt-sonic-fullcone/master/add_sonic_fullcone.sh | bash

    - name: 提取插件列表
      id: extract-packages
      run: |
        echo "正在从源配置文件 ${{ matrix.config_file }} 中提取插件列表..."
        grep 'luci-app-' ${{ matrix.config_file }} | \
        grep -v '^#' | \
        grep -v 'is not set' | \
        sed -e 's/CONFIG_PACKAGE_//g' -e 's/=y//g' | \
        sort > packages.txt || true

        echo "检查生成的文件内容："
        if [ -s packages.txt ]; then
          cat packages.txt
          echo "文件生成成功！"
        else
          echo "警告：packages.txt 为空！可能是源配置文件中没有 luci-app 插件。"
          echo "无插件信息" > packages.txt
        fi

    - name: 上传插件列表产物
      uses: actions/upload-artifact@main
      with:
        name: package-list-${{ matrix.device }}
        path: ${{ github.workspace }}/packages.txt

    - name: 加载自定义配置 (Part 2)
      run: |
        [ -e $GITHUB_WORKSPACE/$DEFAULT_SETTING ] && mv $GITHUB_WORKSPACE/$DEFAULT_SETTING openwrt/package/default-settings-m0eak
        [ -d $GITHUB_WORKSPACE/files ] && mv $GITHUB_WORKSPACE/files openwrt/files
        [ -e "${{ matrix.config_file }}" ] && mv ${{ matrix.config_file }} openwrt/.config
        cd openwrt
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig
        echo "当前 diffconfig:"
        ./scripts/diffconfig.sh

    - name: 缓存工具链
      uses: HiGarfield/cachewrtbuild@main
      if: env.CACHE_TOOLCHAIN != 'false'
      with:
        ccache: true
        mixkey: ${{ github.workflow }}-${{ matrix.workflow_name }}-${{ hashFiles(matrix.config_file, '**/scripts-part*.sh') }}
        prefix: ${{ env.OPENWRT_PATH }}

    - name: 下载软件包
      run: |
        cd openwrt
        make download -j$(nproc) || make download -j1 V=s
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        echo "使用 $(nproc) 线程进行编译..."
        make -j$(expr $(nproc) + 1) || make -j1 V=s

    - name: 编译后清理临时文件
      if: success()
      run: |
        echo "编译完成，开始清理临时编译目录..."
        cd openwrt
        rm -rf build_dir tmp
        echo "临时文件清理完毕！"

    - name: 整理固件文件
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: 上传固件产物
      uses: actions/upload-artifact@main
      with:
        name: firmware-${{ matrix.device }}
        path: ${{ env.FIRMWARE_PATH }}

  publish_release:
    name: 合并并发布固件
    needs: build
    runs-on: ubuntu-22.04
    if: success()

    steps:
    - name: 下载所有固件产物
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts

    - name: 重命名固件文件以避免冲突
      run: |
        echo "开始重命名通用文件以防止上传冲突..."
        for dir in all-artifacts/firmware-*; do
          DEVICE_NAME=$(basename "$dir" | sed 's/firmware-//')
          echo "正在处理设备: $DEVICE_NAME"
          cd "$dir"
          for file in version.buildinfo sha256sums profiles.json config.buildinfo feeds.buildinfo; do
            if [ -f "$file" ]; then
              mv "$file" "${DEVICE_NAME}-${file}"
              echo "  重命名: $file -> ${DEVICE_NAME}-${file}"
            fi
          done
          if [ -f "${DEVICE_NAME}-sha256sums" ]; then
            sed -i "s/ \*/ ${DEVICE_NAME}-/" "${DEVICE_NAME}-sha256sums"
          fi
          cd ../..
        done
        echo "所有文件重命名完毕！"

    - name: 生成统一发布标签和内容
      id: release-meta
      run: |
        DATE_SUFFIX=$(date +"%Y%m%d-%H%M")
        RELEASE_TAG="filogic-${DATE_SUFFIX}"
        echo "生成的统一发布标签: $RELEASE_TAG"
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_ENV

        echo "### 固件下载" > release-body.md
        echo "" >> release-body.md
        echo "本次发布包含以下设备的固件：" >> release-body.md
        for dir in all-artifacts/firmware-*; do
          DEVICE_NAME=$(basename "$dir" | sed 's/firmware-//')
          echo "- **$DEVICE_NAME**" >> release-body.md
        done
        echo "" >> release-body.md
        echo "---" >> release-body.md

        echo "### 插件列表详情" >> release-body.md
        for dir in all-artifacts/package-list-*; do
          DEVICE_NAME=$(basename "$dir" | sed 's/package-list-//')
          echo "" >> release-body.md
          echo "#### 🔌 $DEVICE_NAME" >> release-body.md
          sed 's/^/- /' "$dir/packages.txt" >> release-body.md
        done

    - name: 创建统一 Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.release_tag }}
        body_path: release-body.md
        files: |
          all-artifacts/firmware-*/*.manifest
          all-artifacts/firmware-*/*sysupgrade.bin
          all-artifacts/firmware-*/*factory.bin
          all-artifacts/firmware-*/*initramfs-kernel.bin
          all-artifacts/firmware-*/*-version.buildinfo
          all-artifacts/firmware-*/*-sha256sums
          all-artifacts/firmware-*/*-profiles.json
          all-artifacts/firmware-*/*-config.buildinfo
          all-artifacts/firmware-*/*-feeds.buildinfo
