name: Build filogic

on:
  # schedule:
  #   - cron: '0 2 */5 * *'
  workflow_dispatch:

env:
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: ./sh/scripts-part1.sh
  DIY_P2_SH: ./sh/scripts-part2.sh
  DEFAULT_SETTING: ./default-settings-m0eak
  CACHE_TOOLCHAIN: true
  TZ: Asia/Shanghai

jobs:
  build:
    name: 编译 ${{ matrix.device }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: GL-MT3600BE
            repo_url: 'https://github.com/m0eak/openwrt.git'
            repo_branch: 'mt3600be'
            config_file: './config/mt3600be.config'
            workflow_name: 'GL-MT3600BE'
          - device: GL-MT5000
            repo_url: 'https://github.com/m0eak/fanchmwrt.git'
            repo_branch: 'mt5000'
            config_file: './config/mt5000.config'
            workflow_name: 'GL-MT5000'
    
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@main

    - name: 查看运行环境配置
      run: |
        echo "================================================="
        echo "           GitHub Actions 运行环境详情"
        echo "================================================="
        echo "CPU 信息:"
        lscpu
        echo "CPU 线程数: $(nproc)"
        echo "-------------------------------------------------"
        echo "内存信息:"
        free -h
        echo "Swap 分区大小: $(grep SwapTotal /proc/meminfo | awk '{print $2/1024/1024 " GB"}')"
        echo "-------------------------------------------------"
        echo "磁盘空间信息:"
        df -hT
        echo "-------------------------------------------------"
        echo "操作系统信息:"
        uname -a
        lsb_release -a
        echo "================================================="

    - name: 磁盘清理
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"

    - name: 磁盘清理2
      run: |
        echo "清理前磁盘空间："
        df -hT
        echo "开始清理，释放更多空间..."
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /usr/share/swift /usr/local/.ghcup
        sudo docker image prune --all --force
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        echo "清理后磁盘空间："
        df -hT

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/*
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq purge azure-cli* ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "WORKFLOW_NAME=${{ matrix.workflow_name }}" >> $GITHUB_ENV

    - name: 克隆固件源代码
      working-directory: /workdir
      run: |
        git clone -b ${{ matrix.repo_branch }} ${{ matrix.repo_url }} --single-branch --depth 1 openwrt

    - name: 加载自定义配置
      run: |
        [ -e "${{ matrix.config_file }}" ] && mv ${{ matrix.config_file }} /workdir/openwrt/.config
        chmod +x $DIY_P1_SH
        cd /workdir/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH ${{ matrix.device }}

    - name: 更新 feeds
      run: |
        cd /workdir/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 运行 DIY 脚本 2
      run: |
        chmod +x $DIY_P2_SH
        cd /workdir/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH ${{ matrix.device }}
        make defconfig
        ./scripts/diffconfig.sh

    - name: 下载软件包
      run: |
        cd /workdir/openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd /workdir/openwrt
        echo -e "开始编译... 任务线程数：$(nproc)"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "编译完成！"

    - name: 整理固件文件
      id: organize
      run: |
        cd /workdir/openwrt
        rm -rf firmware tmp && mkdir firmware && cp bin/targets/*/*/*sysupgrade.bin firmware/ || true
        cp .config firmware/config.txt
        echo "FIRMWARE=$PWD/firmware" >> $GITHUB_OUTPUT
        DATE_SUFFIX=$(date +"%Y%m%d-%H%M")
        echo "RELEASE_TAG=${{ matrix.device }}-${DATE_SUFFIX}" >> $GITHUB_ENV

    - name: 上传固件产物
      uses: actions/upload-artifact@main
      with:
        name: ${{ matrix.device }}-firmware
        path: ${{ steps.organize.outputs.FIRMWARE }}

    - name: 发布 Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ env.RELEASE_TAG }}
        artifacts: ${{ steps.organize.outputs.FIRMWARE }}/*
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          **固件信息**
          - 机型: ${{ matrix.device }}
          - 源码仓库: ${{ matrix.repo_url }}
          - 分支: ${{ matrix.repo_branch }}
          - 配置文件: ${{ matrix.config_file }}
          - 编译时间: $(date +"%Y-%m-%d %H:%M:%S")
