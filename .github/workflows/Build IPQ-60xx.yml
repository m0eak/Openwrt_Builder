name: Build IPQ-60xx

on:
  schedule:
    - cron: '0 16 */5 * *'
  repository_dispatch:
  workflow_dispatch:
    inputs:
      docker:
        description: '是否编译 docker'
        required: false
        default: 'false'
      tag:
        description: 'libwrt 版本'
        required: false
        default: '25.12.4'

env:
  REPO_URL_IMM: https://github.com/m0eak/libwrt.git
  REPO_BRANCH: 25.12.4

jobs:
  build:
    name: 编译 ${{ matrix.device }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: AXT-1800
            config_file: ./config/axt1800.config
            workflow_name: AXT-1800
          - device: JDC-AX6600
            config_file: ./config/jdcax6600.config
            workflow_name: JDC-AX6600
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Build ${{ matrix.device }}
        uses: ./.github/actions/openwrt-build-device
        with:
          device: ${{ matrix.device }}
          config-file: ${{ matrix.config_file }}
          workflow-name: ${{ matrix.workflow_name }}
          repo-url: ${{ env.REPO_URL_IMM }}
          repo-branch: ${{ github.event.inputs.tag || env.REPO_BRANCH }}
          extra-config-file: ${{ github.event.inputs.docker == 'true' && './config/docker.config' || '' }}

  publish_release:
    name: 合并并发布固件
    needs: build
    runs-on: ubuntu-22.04
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Publish release
        uses: ./.github/actions/openwrt-publish-release
        with:
          release-tag-prefix: IPQ60xx-25.12-${{ github.event.inputs.tag || env.REPO_BRANCH }}
          source-url: ${{ env.REPO_URL_IMM }}
          source-branch: ${{ github.event.inputs.tag || env.REPO_BRANCH }}
          release-files: all-artifacts/firmware-*/*
