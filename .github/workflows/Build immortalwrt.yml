name: Build immortalwrt

on:
  #schedule:
    #- cron: '0 16 * * *'
  repository_dispatch:
  workflow_dispatch:
    inputs:
      docker:
        description: '是否编译docker'
        required: false
        default: 'false'
      tag2:
        description: 'ImmortalWrt版本'
        required: false
        default: 'v24.10.4'

env:
  REPO_URL_IMM: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ./config/immortalwrt.config
  CONFIG_FILE_DOCKER: ./config/docker.config
  DIY_P1_SH: ./sh/scripts-part1.sh
  DIY_P2_SH: ./sh/scripts-part2.sh
  DEFAULT_SETTING: ./default-settings-m0eak
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: 释放磁盘空间
      run: |
        echo "清理前磁盘空间："
        df -hT
        # 仅删除最占空间的大型预装软件
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        echo "清理后磁盘空间："
        df -hT


    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
          sudo -E apt-get update
          sudo -E apt-get -y install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          echo "WORKFLOW_NAME=x86_immortalwrt" >> $GITHUB_ENV
          echo "TAG2=${{ github.event.inputs.tag2 }}" | tr ' ' '_' >> $GITHUB_ENV


    - name: 克隆源代码
      working-directory: /workdir
      run: |
        df -hT $PWD
        REPO_URL=$REPO_URL_IMM
        git clone $REPO_URL --single-branch openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        git fetch --tags # 获取最新的标签
        git checkout "tags/${TAG2}" || git checkout "${TAG2}" # 尝试检出标签，如果失败则尝试检出分支
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        
    - name: 加载自定义源
      run: |
        echo "WORKFLOW_NAME=x86_immortalwrt" >> $GITHUB_ENV
        cat $GITHUB_OUTPUT
        cat $GITHUB_ENV
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        ./scripts/feeds update -a
        $GITHUB_WORKSPACE/$DIY_P1_SH

    #- name: 更新源
    #  run: cd openwrt && ./scripts/feeds update -a

    - name: 安装源
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        echo "WORKFLOW_NAME=x86_immortalwrt" >> $GITHUB_ENV
        cat $GITHUB_OUTPUT
        [ -e $DEFAULT_SETTING ] && mv $DEFAULT_SETTING openwrt/package/default-settings-m0eak
        ls openwrt/package/
        [ -e files ] && mv ./files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        if [ "${{ github.event.inputs.docker }}" = "true" ] && [ -e $CONFIG_FILE_DOCKER ]; then
          cat $CONFIG_FILE_DOCKER >> openwrt/.config
        fi
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig
        echo "当前diffconfig:"
        ./scripts/diffconfig.sh        

    - name: 检查并恢复缓存
      id: check-cache
      uses: actions/cache@v4
      with:
        key: ${{ runner.os }}-${{ github.workflow }}-${{ env.TAG2 }}-${{ hashFiles('openwrt/.config', 'openwrt/feeds.conf.default', '**/scripts-part*.sh') }}
        restore-keys: |
          ${{ runner.os }}-${{ github.workflow }}-${{ env.TAG2 }}-
        path: |
          openwrt/.ccache
          openwrt/staging_dir/host*
          openwrt/staging_dir/tool*

    - name: 更新缓存并处理时间戳
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "${{ steps.check-cache.outputs.cache-hit }}" == "true" ]; then
          echo "缓存命中，更新时间戳..."
          cd openwrt
          find staging_dir -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
            find "$DIR" -type f -exec touch {} +
          done
          echo "时间戳更新完毕!"
        else
          echo "缓存未命中，开始主动清理相关的旧缓存..."
          
          # 清理 Go 模块缓存，防止污染
          rm -rf openwrt/dl/go-mod-cache

          # 构造用于搜索的 key 前缀
          CACHE_PREFIX="${{ runner.os }}-${{ github.workflow }}-${{ env.TAG2 }}-"
          
          echo "正在搜索前缀为 '${CACHE_PREFIX}' 的旧缓存..."
          CACHE_LIST=$(gh cache list --key "$CACHE_PREFIX" | cut -f 1)
          
          if [ -n "$CACHE_LIST" ]; then
            for CACHE_KEY in $CACHE_LIST; do
              echo "删除旧缓存: $CACHE_KEY"
              gh cache delete "$CACHE_KEY" 
            done
            echo "相关旧缓存清理完毕!"
          else
            echo "没有找到相关的旧缓存。"
          fi
        fi

    - name: 下载软件包
      id: package
      run: |
         cd openwrt
         make download -j8
         find dl -size -1024c -exec ls -l {} \;
         find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) 线程编译"
        make -j$(expr $(nproc) + 1) || make -j1 V=s
        echo "compile-status=success" >> $GITHUB_ENV
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "compile=success" >> $GITHUB_OUTPUT
        if [ -s DEVICE_NAME ]; then
          echo "device-name=$(cat DEVICE_NAME)" >> $GITHUB_OUTPUT
        fi
        echo "file-date=$(date +"%Y%m%d%H%M")" >> $GITHUB_OUTPUT

    - name: 检查空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.compile == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ steps.compile.outputs.device-name }}_${{ steps.compile.outputs.file-date }}
        path: openwrt/bin

    - name: Release firmware
      uses: ./.github/actions/openwrt-release-firmware
      if: steps.compile.outputs.compile == 'success' && !cancelled()
      with:
        upload-firmware: ${{ env.UPLOAD_FIRMWARE }}
        upload-release: ${{ env.UPLOAD_RELEASE }}
        workflow-name: ${{ env.WORKFLOW_NAME }}
        source-tag: ${{ env.TAG2 }}
        release-tag-prefix: immortalwrt_x86_64
        source-url: ${{ env.REPO_URL_IMM }}
        artifact-name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
  
  
