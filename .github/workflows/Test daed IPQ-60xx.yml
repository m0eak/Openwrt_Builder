name: Test daed IPQ-60xx

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '内核版本'
        required: false
        default: '25.12.4'

env:
  REPO_URL_IMM: https://github.com/m0eak/libwrt.git
  REPO_BRANCH: 25.12.4
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: ./sh/scripts-part1.sh
  DIY_P2_SH: ./sh/scripts-part2.sh
  DEFAULT_SETTING: ./default-settings-m0eak
  TZ: Asia/Shanghai

jobs:
  build:
    name: 测试 daed 编译
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: AXT-1800
            config_file: './config/axt1800.config'
            workflow_name: 'AXT-1800'

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@main

    - name: 查看运行环境配置
      run: |
        lscpu
        free -h
        df -hT
        uname -a
        lsb_release -a || true

    - name: 磁盘清理
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"

    - name: 磁盘清理2
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /usr/share/swift /usr/local/.ghcup
        sudo docker image prune --all --force
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        df -hT

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/*
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq purge azure-cli* ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        if [ -n "${{ github.event.inputs.tag }}" ]; then
          echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
        else
          echo "TAG=$REPO_BRANCH" >> $GITHUB_ENV
        fi

    - name: 克隆固件源代码
      working-directory: /workdir
      run: |
        git clone -b "${TAG}" $REPO_URL_IMM --single-branch --depth 1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        git fetch --tags
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: 加载 Feeds 和自定义脚本 (Part 1)
      run: |
        cd openwrt
        [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF ./feeds.conf.default
        ./scripts/feeds update -a
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 安装 Feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置 (Part 2)
      run: |
        [ -e $GITHUB_WORKSPACE/$DEFAULT_SETTING ] && mv $GITHUB_WORKSPACE/$DEFAULT_SETTING openwrt/package/default-settings-m0eak
        [ -d $GITHUB_WORKSPACE/files ] && mv $GITHUB_WORKSPACE/files openwrt/files
        [ -e "${{ matrix.config_file }}" ] && mv ${{ matrix.config_file }} openwrt/.config
        cd openwrt
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig
        ./scripts/diffconfig.sh || true

    - name: 预编译 tools、toolchain、kernel 依赖
      run: |
        cd openwrt
        echo "开始预编译 tools..."
        make tools/install -j$(nproc) || make tools/install -j1
        echo "开始预编译 toolchain..."
        make toolchain/install -j$(nproc) || make toolchain/install -j1
        echo "开始预编译 target/kernel..."
        make target/compile -j$(nproc) || make target/compile -j1

    - name: 仅下载 daed 相关源码
      run: |
        cd openwrt
        make package/custom/luci-app-daed/daed/download || make package/custom/luci-app-daed/daed/download -j1

    - name: 仅编译 daed 包
      run: |
        cd openwrt
        echo "开始单独编译 daed 包..."
        make package/custom/luci-app-daed/daed/clean || true
        make package/custom/luci-app-daed/daed/compile -j$(nproc) || make package/custom/luci-app-daed/daed/compile -j1

    - name: 上传 daed ipk 与日志线索
      if: always()
      uses: actions/upload-artifact@main
      with:
        name: daed-test-${{ matrix.device }}
        path: |
          openwrt/bin/packages
          openwrt/bin/targets
          openwrt/logs
          openwrt/build_dir/target-*/daed-*/**/*
