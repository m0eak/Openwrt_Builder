name: OpenWrt build device

on:
  workflow_call:
    inputs:
      device:
        description: Device name used for artifact names.
        required: true
        type: string
      config_file:
        description: Repository config file to move into openwrt/.config.
        required: true
        type: string
      extra_config_file:
        description: Optional repository config fragment appended after the base config.
        default: ""
        type: string
      workflow_name:
        description: Logical workflow/device name consumed by custom shell scripts.
        required: true
        type: string
      repo_url:
        description: OpenWrt source repository URL.
        required: true
        type: string
      repo_branch:
        description: OpenWrt source branch or tag.
        required: true
        type: string
      feeds_conf:
        description: Custom feeds.conf.default path in the repository.
        default: feeds.conf.default
        type: string
      diy_p1_sh:
        description: Part 1 custom script path.
        default: ./sh/scripts-part1.sh
        type: string
      diy_p2_sh:
        description: Part 2 custom script path.
        default: ./sh/scripts-part2.sh
        type: string
      default_setting:
        description: Custom default settings package path.
        default: ./default-settings-m0eak
        type: string
      cache_toolchain:
        description: Whether to enable toolchain cache.
        default: "true"
        type: string
      timezone:
        description: Runner timezone.
        default: Asia/Shanghai
        type: string
      install_automake_117:
        description: Install local Automake 1.17 before cloning source.
        default: "false"
        type: string
      sonic_fullcone:
        description: Apply Sonic Fullcone patch after feeds install.
        default: "false"
        type: string

jobs:
  build:
    name: 编译 ${{ inputs.device }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Show runner environment
        shell: bash
        run: |
          echo "::group::Build workflow inputs"
          echo "device=${{ inputs.device }}"
          echo "workflow_name=${{ inputs.workflow_name }}"
          echo "repo_url=${{ inputs.repo_url }}"
          echo "repo_branch=${{ inputs.repo_branch }}"
          echo "config_file=${{ inputs.config_file }}"
          echo "extra_config_file=${{ inputs.extra_config_file }}"
          echo "feeds_conf=${{ inputs.feeds_conf }}"
          echo "diy_p1_sh=${{ inputs.diy_p1_sh }}"
          echo "diy_p2_sh=${{ inputs.diy_p2_sh }}"
          echo "default_setting=${{ inputs.default_setting }}"
          echo "cache_toolchain=${{ inputs.cache_toolchain }}"
          echo "install_automake_117=${{ inputs.install_automake_117 }}"
          echo "sonic_fullcone=${{ inputs.sonic_fullcone }}"
          for path in \
            "${{ inputs.config_file }}" \
            "${{ inputs.extra_config_file }}" \
            "${{ inputs.feeds_conf }}" \
            "${{ inputs.diy_p1_sh }}" \
            "${{ inputs.diy_p2_sh }}" \
            "${{ inputs.default_setting }}" \
            "files"; do
            [ -z "$path" ] && continue
            if [ -e "$path" ]; then
              echo "exists: $path"
            else
              echo "missing: $path"
            fi
          done
          echo "::endgroup::"

          echo "::group::Runner environment"
          echo "================================================="
          echo "GitHub Actions runner environment"
          echo "================================================="
          lscpu
          echo "CPU threads: $(nproc)"
          free -h
          df -hT
          uname -a
          lsb_release -a || true
          echo "::endgroup::"

      - name: Optimize disk space
        uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
        with:
          operate_sudo: "True"
          general_include: ".+"
          general_exclude: |-
            ^GCC$
            ^G\+\+$
            Clang
            LLVM
          docker_prune: "True"
          docker_clean: "True"
          apt_prune: "True"
          apt_clean: "True"

      - name: Remove large preinstalled tools
        shell: bash
        run: |
          echo "Disk before cleanup:"
          df -hT
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/share/swift /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk after cleanup:"
          df -hT

      - name: Initialize build environment
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ inputs.timezone }}
        run: |
          sudo rm -rf /etc/apt/sources.list.d/*
          sudo -E apt-get -yqq update
          sudo -E apt-get -yqq purge azure-cli* ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo -E apt-get install -y clang llvm nodejs dwarves
          sudo npm install -g pnpm
          sudo -E apt-get -yqq autoremove --purge
          sudo -E apt-get -yqq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir
          echo "WORKFLOW_NAME=${{ inputs.workflow_name }}" >> "$GITHUB_ENV"
          echo "TAG=${{ inputs.repo_branch }}" >> "$GITHUB_ENV"

      - name: Install local Automake 1.17
        if: ${{ inputs.install_automake_117 == 'true' }}
        shell: bash
        run: |
          set -e
          PREFIX=/workdir/automake-1.17
          BUILD_DIR=/workdir/automake-1.17-build
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          curl -fL https://ftp.gnu.org/gnu/automake/automake-1.17.tar.xz -o automake-1.17.tar.xz
          rm -rf automake-1.17-src
          mkdir -p automake-1.17-src
          tar -xf automake-1.17.tar.xz -C automake-1.17-src --strip-components=1
          cd automake-1.17-src
          ./configure --prefix="$PREFIX"
          make -j"$(nproc)"
          make install
          echo "$PREFIX/bin" >> "$GITHUB_PATH"
          "$PREFIX/bin/automake-1.17" --version | sed -n '1p'
          "$PREFIX/bin/aclocal-1.17" --version | sed -n '1p'

      - name: Clone firmware source
        id: clone-source
        shell: bash
        working-directory: /workdir
        run: |
          git clone -b "${{ inputs.repo_branch }}" "${{ inputs.repo_url }}" --single-branch --depth 1 openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"
          cd openwrt
          git fetch --tags || true
          echo "::group::OpenWrt source revision"
          git log -1 --oneline
          git remote -v
          git status --short
          echo "::endgroup::"
          echo "OPENWRT_PATH=$PWD" >> "$GITHUB_ENV"
          echo "openwrt-path=$PWD" >> "$GITHUB_OUTPUT"

      - name: Update feeds and run custom script part 1
        shell: bash
        run: |
          cd openwrt
          [ -e "$GITHUB_WORKSPACE/${{ inputs.feeds_conf }}" ] && cp "$GITHUB_WORKSPACE/${{ inputs.feeds_conf }}" ./feeds.conf.default
          echo "::group::Feeds configuration"
          pwd
          ls -l feeds.conf.default || true
          sed -n '1,80p' feeds.conf.default || true
          echo "::endgroup::"
          ./scripts/feeds update -a
          chmod +x "$GITHUB_WORKSPACE/${{ inputs.diy_p1_sh }}"
          "$GITHUB_WORKSPACE/${{ inputs.diy_p1_sh }}"

      - name: Install feeds
        shell: bash
        run: cd openwrt && ./scripts/feeds install -a

      - name: Apply Sonic Fullcone patch
        if: ${{ inputs.sonic_fullcone == 'true' }}
        shell: bash
        run: |
          cd openwrt
          curl -sSL https://raw.githubusercontent.com/mufeng05/openwrt-sonic-fullcone/master/add_sonic_fullcone.sh | bash

      - name: Extract LuCI package list
        shell: bash
        run: |
          echo "::group::LuCI package extraction inputs"
          echo "Extracting LuCI packages from ${{ inputs.config_file }}"
          cp "${{ inputs.config_file }}" package-source.config
          if [ -n "${{ inputs.extra_config_file }}" ] && [ -e "${{ inputs.extra_config_file }}" ]; then
            echo "Appending extra config: ${{ inputs.extra_config_file }}"
            cat "${{ inputs.extra_config_file }}" >> package-source.config
          else
            echo "No extra config appended."
          fi
          wc -l package-source.config
          sha256sum package-source.config
          echo "::endgroup::"

          grep 'luci-app-' package-source.config | \
            grep -v '^#' | \
            grep -v 'is not set' | \
            sed -e 's/CONFIG_PACKAGE_//g' -e 's/=y//g' | \
            sort > packages.txt || true

          if [ -s packages.txt ]; then
            cat packages.txt
          else
            echo "No LuCI package information found." > packages.txt
          fi

      - name: Upload package list artifact
        uses: actions/upload-artifact@main
        with:
          name: package-list-${{ inputs.device }}
          path: ${{ github.workspace }}/packages.txt

      - name: Apply custom config and run custom script part 2
        shell: bash
        run: |
          [ -e "$GITHUB_WORKSPACE/${{ inputs.default_setting }}" ] && mv "$GITHUB_WORKSPACE/${{ inputs.default_setting }}" openwrt/package/default-settings-m0eak
          [ -d "$GITHUB_WORKSPACE/files" ] && mv "$GITHUB_WORKSPACE/files" openwrt/files
          [ -e "${{ inputs.config_file }}" ] && mv "${{ inputs.config_file }}" openwrt/.config
          if [ -n "${{ inputs.extra_config_file }}" ] && [ -e "${{ inputs.extra_config_file }}" ]; then
            cat "${{ inputs.extra_config_file }}" >> openwrt/.config
          fi
          cd openwrt
          echo "::group::Pre-defconfig workspace snapshot"
          pwd
          ls -ld package/default-settings-m0eak files .config 2>/dev/null || true
          grep -E '^(CONFIG_TARGET|CONFIG_PACKAGE_(docker|dockerd|luci-app-dockerman|containerd|runc))' .config || true
          echo "::endgroup::"
          chmod +x "$GITHUB_WORKSPACE/${{ inputs.diy_p2_sh }}"
          "$GITHUB_WORKSPACE/${{ inputs.diy_p2_sh }}"
          make defconfig
          echo "::group::Current diffconfig"
          ./scripts/diffconfig.sh
          echo "::endgroup::"

      - name: Cache toolchain
        uses: HiGarfield/cachewrtbuild@main
        if: ${{ inputs.cache_toolchain != 'false' }}
        with:
          ccache: true
          mixkey: ${{ github.workflow }}-${{ inputs.workflow_name }}-${{ hashFiles(inputs.config_file, '**/scripts-part*.sh') }}
          prefix: ${{ steps.clone-source.outputs.openwrt-path }}

      - name: Download packages
        shell: bash
        run: |
          cd openwrt
          make download -j"$(nproc)" || make download -j1 V=s
          echo "::group::Download directory summary"
          du -sh dl || true
          find dl -size -1024c -exec ls -l {} \; || true
          echo "::endgroup::"
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        shell: bash
        run: |
          cd openwrt
          echo "Compiling with $(nproc) threads..."
          make -j"$(expr "$(nproc)" + 1)" || make -j1 V=s

      - name: Remove temporary build files
        if: success()
        shell: bash
        run: |
          cd openwrt
          rm -rf build_dir tmp

      - name: Organize firmware files
        id: organize
        shell: bash
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "::group::Firmware files"
          pwd
          find . -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
          echo "::endgroup::"
          echo "FIRMWARE_PATH=$PWD" >> "$GITHUB_ENV"
          echo "firmware-path=$PWD" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@main
        with:
          name: firmware-${{ inputs.device }}
          path: ${{ steps.organize.outputs.firmware-path }}
