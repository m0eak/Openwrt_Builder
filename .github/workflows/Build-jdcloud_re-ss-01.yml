name: Build jdcloud_re-ss-01 Device

on:
  schedule:
    - cron: '0 2 */4 * *'
  workflow_dispatch:

env:
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: ./sh/scripts-part1.sh
  DIY_P2_SH: ./sh/scripts-part2.sh
  DEFAULT_SETTING: ./default-settings-m0eak
  CACHE_TOOLCHAIN: true
  TZ: Asia/Shanghai
  WORKFLOW_NAME: jdcloud_re-ss-01

jobs:
  build:
    name: Build jdcloud_re-ss-01
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: jdcloud_re-ss-01
            repo_url: 'https://github.com/fanchmwrt/fanchmwrt.git'
            repo_branch: 'fanchmwrt-25.12.2'
            config_file: './config/jdcloud_re-ss-01.config'
            workflow_name: 'jdcloud_re-ss-01'

    steps:
    - name: Checkout repository
      uses: actions/checkout@main

    - name: Check environment config
      run: |
        echo "================================================="
        echo "           GitHub Actions running environment details"
        echo "================================================="
        echo "CPU info:"
        lscpu
        echo "CPU thread count: $(nproc)"
        echo "-------------------------------------------------"
        echo "Memory info:"
        free -h
        echo "-------------------------------------------------"
        echo "Disk space info:"
        df -hT
        echo "================================================="

    - name: Disk cleanup
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"

    - name: Disk cleanup 2
      run: |
        echo "Disk space before cleanup:"
        df -hT
        echo "Starting cleanup, free up more space..."
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /usr/share/swift /usr/local/.ghcup
        sudo docker image prune --all --force
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        echo "Disk space after cleanup:"
        df -hT

    - name: Initialize build environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/*
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq purge azure-cli* ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "WORKFLOW_NAME=${{ matrix.workflow_name }}" >> $GITHUB_ENV

    - name: Install local Automake 1.17
      run: |
        set -e
        PREFIX=/workdir/automake-1.17
        BUILD_DIR=/workdir/automake-1.17-build
        mkdir -p "$BUILD_DIR"
        cd "$BUILD_DIR"
        curl -fL https://ftp.gnu.org/gnu/automake/automake-1.17.tar.xz -o automake-1.17.tar.xz
        rm -rf automake-1.17-src
        mkdir -p automake-1.17-src
        tar -xf automake-1.17.tar.xz -C automake-1.17-src --strip-components=1
        cd automake-1.17-src
        ./configure --prefix="$PREFIX"
        make -j$(nproc)
        make install
        echo "$PREFIX/bin" >> $GITHUB_PATH
        "$PREFIX/bin/automake-1.17" --version | sed -n '1p'
        "$PREFIX/bin/aclocal-1.17" --version | sed -n '1p'

    - name: Clone firmware source code
      working-directory: /workdir
      run: |
        git clone -b ${{ matrix.repo_branch }} ${{ matrix.repo_url }} --single-branch --depth 1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: Load Feeds and custom scripts (Part 1)
      run: |
        cd openwrt
        [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF ./feeds.conf.default
        ./scripts/feeds update -a
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Install Feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Extract package list
      id: extract-packages
      run: |
        echo "Extracting package list from config file ${{ matrix.config_file }}..."
        grep 'luci-app-' ${{ matrix.config_file }} | \
        grep -v '^#' | \
        grep -v 'is not set' | \
        sed -e 's/CONFIG_PACKAGE_//g' -e 's/=y//g' | \
        sort > packages.txt || true

        echo "Checking generated file content:"
        if [ -s packages.txt ]; then
          cat packages.txt
          echo "File generated successfully!"
        else
          echo "Warning: packages.txt is empty! Probably no luci-app packages in source config file."
          echo "No package info" > packages.txt
        fi

    - name: Upload package list artifact
      uses: actions/upload-artifact@main
      with:
        name: package-list-${{ matrix.device }}
        path: ${{ github.workspace }}/packages.txt

    - name: Load custom config (Part 2)
      run: |
        [ -e $GITHUB_WORKSPACE/$DEFAULT_SETTING ] && mv $GITHUB_WORKSPACE/$DEFAULT_SETTING openwrt/package/default-settings-m0eak
        [ -d $GITHUB_WORKSPACE/files ] && mv $GITHUB_WORKSPACE/files openwrt/files
        [ -e "${{ matrix.config_file }}" ] && mv ${{ matrix.config_file }} openwrt/.config
        cd openwrt
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig
        echo "Current diffconfig:"
        ./scripts/diffconfig.sh

    - name: Cache toolchain
      uses: HiGarfield/cachewrtbuild@main
      if: env.CACHE_TOOLCHAIN != 'false'
      with:
        ccache: true
        mixkey: ${{ github.workflow }}-${{ matrix.workflow_name }}-${{ hashFiles(matrix.config_file, '**/scripts-part*.sh') }}
        prefix: ${{ env.OPENWRT_PATH }}

    - name: Download packages
      run: |
        cd openwrt
        make download -j$(nproc) || make download -j1 V=s
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      run: |
        cd openwrt
        echo "Building with $(nproc) threads..."
        make -j$(expr $(nproc) + 1) || make -j1 V=s

    - name: Clean up temp files after build
      if: success()
      run: |
        echo "Build complete, starting to clean up temp build directory..."
        cd openwrt
        rm -rf build_dir tmp
        echo "Temp files cleanup complete!"

    - name: Organize firmware files
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload firmware artifact
      uses: actions/upload-artifact@main
      with:
        name: firmware-${{ matrix.device }}
        path: ${{ env.FIRMWARE_PATH }}

  publish_release:
    name: Merge and publish firmware
    needs: build
    runs-on: ubuntu-22.04
    if: success()

    steps:
    - name: Download all firmware artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts

    - name: Rename firmware files to avoid conflicts
      run: |
        echo "Starting to rename common files to prevent upload conflicts..."
        for dir in all-artifacts/firmware-*; do
          DEVICE_NAME=$(basename "$dir" | sed 's/firmware-//')
          echo "Processing device: $DEVICE_NAME"
          cd "$dir"
          for file in version.buildinfo sha256sums profiles.json config.buildinfo feeds.buildinfo; do
            if [ -f "$file" ]; then
              mv "$file" "${DEVICE_NAME}-${file}"
              echo "  Renamed: $file -> ${DEVICE_NAME}-${file}"
            fi
          done
          if [ -f "${DEVICE_NAME}-sha256sums" ]; then
            sed -i "s/ \*/ ${DEVICE_NAME}-/" "${DEVICE_NAME}-sha256sums"
          fi
          cd ../..
        done
        echo "All file renaming complete!"

    - name: Generate unified release tag and content
      id: release-meta
      run: |
        DATE_SUFFIX=$(date +"%Y%m%d-%H%M")
        RELEASE_TAG="jdcloud_re-ss-01-${DATE_SUFFIX}"
        echo "Generated unified release tag: $RELEASE_TAG"
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_ENV

        echo "### Firmware download" > release-body.md
        echo "" >> release-body.md
        echo "This release contains firmware for the following devices:" >> release-body.md
        for dir in all-artifacts/firmware-*; do
          DEVICE_NAME=$(basename "$dir" | sed 's/firmware-//')
          echo "- **$DEVICE_NAME**" >> release-body.md
        done
        echo "" >> release-body.md
        echo "---" >> release-body.md

        echo "### Package list details" >> release-body.md
        for dir in all-artifacts/package-list-*; do
          DEVICE_NAME=$(basename "$dir" | sed 's/package-list-//')
          echo "" >> release-body.md
          echo "#### 🔌 $DEVICE_NAME" >> release-body.md
          sed 's/^/- /' "$dir/packages.txt" >> release-body.md
        done

    - name: Create unified release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.release_tag }}
        body_path: release-body.md
        files: |
          all-artifacts/firmware-*/*.manifest
          all-artifacts/firmware-*/*sysupgrade.bin
          all-artifacts/firmware-*/*factory.bin
          all-artifacts/firmware-*/*initramfs-kernel.bin
          all-artifacts/firmware-*/*-version.buildinfo
          all-artifacts/firmware-*/*-sha256sums
          all-artifacts/firmware-*/*-profiles.json
          all-artifacts/firmware-*/*-config.buildinfo
          all-artifacts/firmware-*/*-feeds.buildinfo
